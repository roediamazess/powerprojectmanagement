services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ppm
      POSTGRES_USER: ppm
      POSTGRES_PASSWORD: ppm
    volumes:
      - ppm_prod_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppm -d ppm"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - ppm_prod_redis:/data
    restart: unless-stopped

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      ENV: prod
      DATABASE_URL: postgresql+psycopg://ppm:ppm@db:5432/ppm
      REDIS_URL: redis://redis:6379/0
      BACKUP_DIR: /var/backups/ppm
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: lax
      CORS_ORIGINS: https://powerpm.online
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ppm_prod_backups:/var/backups/ppm
    command:
      [
        "sh",
        "-lc",
        "python -m app.scripts.wait_for_db && alembic upgrade head && python -m app.seed_initial && uvicorn app.main:app --host 0.0.0.0 --port 8000"
      ]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read(); print('ok')"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      ENV: prod
      DATABASE_URL: postgresql+psycopg://ppm:ppm@db:5432/ppm
      REDIS_URL: redis://redis:6379/0
      BACKUP_DIR: /var/backups/ppm
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ppm_prod_backups:/var/backups/ppm
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO"]

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      ENV: prod
      DATABASE_URL: postgresql+psycopg://ppm:ppm@db:5432/ppm
      REDIS_URL: redis://redis:6379/0
      BACKUP_DIR: /var/backups/ppm
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ppm_prod_backups:/var/backups/ppm
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=INFO"]

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  ppm_prod_db:
  ppm_prod_redis:
  ppm_prod_backups:
