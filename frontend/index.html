<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="preload" href="/css/style.css?v=20260414_v1" as="style" />
    <style>
      body[data-theme-version="dark"] {
        background-color: #1a1a2e; /* Approximate legacy dark background */
        color: #e1e1e3;
      }
      #preloader {
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 999999;
        background-color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body[data-theme-version="dark"] #preloader {
        background-color: #1a1a2e;
      }
      .lds-ripple {
        display: inline-block;
        position: relative;
        width: 80px;
        height: 80px;
      }
      .lds-ripple div {
        position: absolute;
        border: 4px solid #886CC0;
        opacity: 1;
        border-radius: 50%;
        animation: lds-ripple 1s cubic-bezier(0, 0.2, 0.8, 1) infinite;
      }
      .lds-ripple div:nth-child(2) {
        animation-delay: -0.5s;
      }
      @keyframes lds-ripple {
        0% { top: 36px; left: 36px; width: 0; height: 0; opacity: 1; }
        100% { top: 0px; left: 0px; width: 72px; height: 72px; opacity: 0; }
      }
      #app:empty {
        display: none;
      }
    </style>
  </head>
  <body data-theme-version="light">
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme-version', savedTheme);
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
